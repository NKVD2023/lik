<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ЛИК{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/note.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ui.css') }}">
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <div class="container header-flex">
            <div class="logo">Локальный Информационный Комплекс</div>
        </div>
    </header>

    <div class="container">
        <div class="breadcrumb">
            <div class="path-info"><span class="root-label"></span> / {% block breadcrumb %}{% endblock %}</div>
            <a href="{{ url_for('main.index') }}" class="cyber-btn">НА ГЛАВНУЮ</a>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
